<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 200" fill="currentColor" aria-hidden="true">
  <!-- 简化 RX-78-2 直立剪影：头 + V 字天线 + 躯干 + 双臂 + 双腿 -->
